# Automotive device hierarchy — maps logical ADAS capabilities to physical devices.
# Providers use official registry packages only (see spanda.providers.toml for planned adapters).
# See docs/automotive-device-tree.md

[fleet]
id = "adas-fleet"

[[fleet.robots]]
id = "vehicle-001"
entity_kind = "vehicle"
model = "PassengerSedan"
compliance_profile = "iso26262"
hardware_profile = "JetsonAutomotive"

[fleet.robots.compute]
id = "compute-001"
type = "JetsonOrin"
serial = "JTN-ADAS-001"

[[fleet.robots.compute.devices]]
id = "front-camera"
type = "Camera"
provider = "spanda-opencv"
mount = "front"
capabilities = ["lane_detection", "traffic_sign_recognition", "pedestrian_detection"]

[[fleet.robots.compute.devices]]
id = "rear-camera"
type = "Camera"
provider = "spanda-opencv"
mount = "rear"
capabilities = ["obstacle_detection", "parking_assist"]

[[fleet.robots.compute.devices]]
id = "stereo-camera"
type = "DepthCamera"
provider = "spanda-opencv"
mount = "front"
capabilities = ["obstacle_detection", "parking_assist"]

[[fleet.robots.compute.devices]]
id = "ultrasonic-array"
type = "Ultrasonic"
provider = "spanda-ultrasonic"
mount = "bumper"
capabilities = ["parking_assist"]

[[fleet.robots.compute.devices]]
id = "front-radar"
type = "Radar"
provider = "spanda-radar"
mount = "front"
capabilities = ["obstacle_detection", "adaptive_speed_control"]

[[fleet.robots.compute.devices]]
id = "front-lidar"
type = "Lidar"
provider = "spanda-lidar"
mount = "front"
capabilities = ["obstacle_detection", "localization"]

[[fleet.robots.compute.devices]]
id = "gps-receiver"
type = "GPS"
provider = "spanda-gps"
port = "/dev/ttyUSB0"
capabilities = ["localization", "route_following", "read_location"]

[[fleet.robots.compute.devices]]
id = "imu"
type = "IMU"
provider = "spanda-fusion"
capabilities = ["localization"]

[[fleet.robots.compute.devices]]
id = "driver-monitor"
type = "Camera"
provider = "spanda-opencv"
mount = "cabin"
capabilities = ["driver_monitoring"]

[[fleet.robots.compute.devices]]
id = "drive-controller"
type = "DifferentialDrive"
provider = "spanda-canbus"
bus = "can1"
capabilities = ["move", "stop", "emergency_stop"]

[[fleet.robots.compute.devices]]
id = "vehicle-canbus"
type = "CommunicationGateway"
provider = "spanda-canbus"
bus = "can0"
capabilities = ["steering_control", "emergency_braking", "adaptive_speed_control"]

[[fleet.robots.compute.devices]]
id = "comm-gateway"
type = "CommunicationGateway"
provider = "spanda-mqtt"
capabilities = ["secure_communication", "telemetry_streaming"]
