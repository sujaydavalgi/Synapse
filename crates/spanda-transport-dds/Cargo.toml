[package]
name = "spanda-transport-dds"
version.workspace = true
edition.workspace = true
description = "DDS transport backend for Spanda (optional live UDP multicast)"
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spanda-ast = { path = "../spanda-ast" }
spanda-runtime = { path = "../spanda-runtime" }
spanda-security = { path = "../spanda-security" }
spanda-transport = { path = "../spanda-transport", default-features = false }

[features]
default = []
live = []
