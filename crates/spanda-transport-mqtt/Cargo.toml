[package]
name = "spanda-transport-mqtt"
version.workspace = true
edition.workspace = true
description = "MQTT transport backend for Spanda (optional live broker via rumqttc)"
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true

[dependencies]
rumqttc = { version = "0.24", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spanda-ast = { path = "../spanda-ast" }
spanda-runtime = { path = "../spanda-runtime" }
spanda-security = { path = "../spanda-security" }
spanda-transport = { path = "../spanda-transport" }

[features]
default = []
live = ["dep:rumqttc"]
