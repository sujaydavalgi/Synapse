[package]
name = "spanda-transport"
version.workspace = true
edition.workspace = true
description = "Spanda transport adapter traits, security policy, and TLS session primitives"
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true

[dependencies]
spanda-runtime = { path = "../spanda-runtime" }
spanda-ast = { path = "../spanda-ast" }
spanda-comm = { path = "../spanda-comm" }
spanda-security = { path = "../spanda-security" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
rustls-pemfile = { version = "2", optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }
webpki-roots = { version = "0.26", optional = true }
sha2 = "0.10"

[features]
default = ["tls"]
tls = ["dep:rustls", "dep:rustls-pemfile", "dep:webpki-roots"]
