[package]
name = "spanda-core"
version = "0.1.0"
edition = "2021"
description = "Spanda robotics language — lexer, parser, type checker, and interpreter"
build = "build.rs"

[dependencies]
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
spanda-audit = { path = "../spanda-audit" }
spanda-security = { path = "../spanda-security" }
pyo3 = { version = "0.23", optional = true, features = ["auto-initialize", "abi3-py310"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libloading = "0.8"

[features]
default = []
python-native = ["dep:pyo3"]
cpp-native = []

[dev-dependencies]
glob = "0.3"
spanda-package = { path = "../spanda-package" }
