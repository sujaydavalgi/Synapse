[package]
name = "spanda-transport-ros2"
version.workspace = true
edition.workspace = true
description = "ROS 2 transport backend for Spanda (native rclrs + rclpy daemon)"
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
spanda-ast = { path = "../spanda-ast" }
spanda-runtime = { path = "../spanda-runtime" }
spanda-transport = { path = "../spanda-transport", default-features = false }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libloading = "0.8"

[features]
default = []
native = []
