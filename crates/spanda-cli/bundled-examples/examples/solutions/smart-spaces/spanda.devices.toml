hardware_profile = "SmartSpaceGatewayV1"

[fleet.robots.compute]
id = "office-orchestrator-compute"
type = "SmartSpaceGateway"
serial = "SS-OFFICE-001"

[[fleet.robots]]
id = "BuildingOrchestrator"
entity_kind = "orchestrator"
