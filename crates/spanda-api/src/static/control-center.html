<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spanda Control Center</title>
  <style>
    :root { font-family: system-ui, sans-serif; color: #e8e8e8; background: #0f1419; }
    body { margin: 0; padding: 1rem 1.5rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .subtitle { color: #8b9bb4; margin: 0 0 1rem; }
    nav { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    nav button { background: #1a2332; color: #c8d6e5; border: 1px solid #2d3a4f; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; }
    nav button.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .panel { background: #1a2332; border: 1px solid #2d3a4f; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .stat { background: #0f1419; padding: 0.75rem; border-radius: 6px; }
    .stat dt { font-size: 0.75rem; color: #8b9bb4; margin: 0; }
    .stat dd { font-size: 1.25rem; margin: 0.25rem 0 0; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #2d3a4f; }
    .error { color: #f87171; }
    .ok { color: #4ade80; }
    pre { overflow: auto; font-size: 0.8rem; }
    .dt-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; align-items: flex-end; }
    .dt-filters label { display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.75rem; color: #8b9bb4; }
    .dt-filters input { background: #0f1419; border: 1px solid #2d3a4f; color: #e8e8e8; border-radius: 6px; padding: 0.35rem 0.5rem; }
    .dt-graph-wrap { overflow: auto; max-height: 420px; border: 1px solid #2d3a4f; border-radius: 8px; background: #0f1419; margin-bottom: 0.75rem; }
    .dt-graph-wrap svg { display: block; }
    .dt-legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; font-size: 0.75rem; color: #8b9bb4; margin-bottom: 0.5rem; }
    .dt-detail { font-size: 0.85rem; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <h1>Spanda Control Center</h1>
  <p class="subtitle">Enterprise operations — Dashboard · Fleet · Readiness · Device Pool</p>
  <nav>
    <button type="button" class="active" data-tab="dashboard">Dashboard</button>
    <button type="button" data-tab="fleet">Fleet</button>
    <button type="button" data-tab="readiness">Readiness</button>
    <button type="button" data-tab="devices">Device Pool</button>
    <button type="button" data-tab="alerts">Alerts</button>
    <button type="button" data-tab="health">Health</button>
    <button type="button" data-tab="assurance">Assurance</button>
    <button type="button" data-tab="diagnosis">Diagnosis</button>
    <button type="button" data-tab="provision">Provision</button>
    <button type="button" data-tab="config">Config</button>
    <button type="button" data-tab="drift">Drift</button>
    <button type="button" data-tab="ota">OTA</button>
    <button type="button" data-tab="security">Security</button>
    <button type="button" data-tab="sre">SRE</button>
    <button type="button" data-tab="operator">Operator</button>
    <button type="button" data-tab="audit">Audit</button>
    <button type="button" data-tab="digital-thread">Digital Thread</button>
    <button type="button" data-tab="adas">ADAS</button>
    <button type="button" data-tab="humans">Humans</button>
    <button type="button" data-tab="executive">Executive</button>
  </nav>
  <div id="error" class="error" hidden></div>
  <section id="tab-dashboard" class="panel"></section>
  <section id="tab-fleet" class="panel" hidden></section>
  <section id="tab-readiness" class="panel" hidden></section>
  <section id="tab-devices" class="panel" hidden></section>
  <section id="tab-alerts" class="panel" hidden></section>
  <section id="tab-health" class="panel" hidden></section>
  <section id="tab-assurance" class="panel" hidden></section>
  <section id="tab-diagnosis" class="panel" hidden></section>
  <section id="tab-provision" class="panel" hidden></section>
  <section id="tab-config" class="panel" hidden></section>
  <section id="tab-drift" class="panel" hidden></section>
  <section id="tab-ota" class="panel" hidden></section>
  <section id="tab-security" class="panel" hidden></section>
  <section id="tab-sre" class="panel" hidden></section>
  <section id="tab-operator" class="panel" hidden></section>
  <section id="tab-audit" class="panel" hidden></section>
  <section id="tab-digital-thread" class="panel" hidden></section>
  <section id="tab-adas" class="panel" hidden></section>
  <section id="tab-humans" class="panel" hidden></section>
  <section id="tab-executive" class="panel" hidden></section>
  <script>
    const tabs = ["dashboard", "fleet", "readiness", "devices", "alerts", "health", "assurance", "diagnosis", "provision", "config", "drift", "ota", "security", "sre", "operator", "audit", "digital-thread", "adas", "humans", "executive"];
    const errEl = document.getElementById("error");

    document.querySelectorAll("nav button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("nav button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        tabs.forEach((t) => {
          document.getElementById("tab-" + t).hidden = t !== tab;
        });
        if (tab === "dashboard") loadDashboard();
        if (tab === "fleet") loadFleet();
        if (tab === "readiness") loadReadiness();
        if (tab === "devices") loadDevices();
        if (tab === "alerts") loadAlerts();
        if (tab === "health") loadHealth();
        if (tab === "assurance") loadAssurance();
        if (tab === "diagnosis") loadDiagnosis();
        if (tab === "provision") loadProvision();
        if (tab === "config") loadConfig();
        if (tab === "drift") loadDrift();
        if (tab === "ota") loadOta();
        if (tab === "security") loadSecurity();
        if (tab === "sre") loadSre();
        if (tab === "operator") loadOperator();
        if (tab === "audit") loadAudit();
        if (tab === "digital-thread") loadDigitalThread();
        if (tab === "adas") loadAdas();
        if (tab === "humans") loadHumans();
        if (tab === "executive") loadExecutive();
      });
    });

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(path + " returned " + res.status);
      return res.json();
    }

    async function apiAuth(method, path, body) {
      const key = window.SPANDA_API_KEY || "";
      const res = await fetch(path, {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(key ? { Authorization: "Bearer " + key } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(path + " returned " + res.status);
      return res.json();
    }

    window.sreAckIncident = async (id) => {
      await apiAuth("POST", "/v1/sre/incidents/" + encodeURIComponent(id) + "/ack", { assignee: "operator" });
      await loadSre();
    };
    window.sreResolveIncident = async (id) => {
      await apiAuth("POST", "/v1/sre/incidents/" + encodeURIComponent(id) + "/resolve", null);
      await loadSre();
    };
    window.sreCreateIncident = async () => {
      await apiAuth("POST", "/v1/sre/incidents", {
        title: "UI incident",
        description: "Opened from Control Center SRE tab",
        severity: "warning",
      });
      await loadSre();
    };

    function showError(msg) {
      errEl.hidden = false;
      errEl.textContent = msg;
    }

    async function loadDashboard() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/dashboard");
        const p = data.device_pool;
        document.getElementById("tab-dashboard").innerHTML = `
          <h2>Dashboard</h2>
          <div class="grid">
            <div class="stat"><dt>Devices</dt><dd>${p.total}</dd></div>
            <div class="stat"><dt>Healthy</dt><dd class="ok">${p.healthy}</dd></div>
            <div class="stat"><dt>Degraded</dt><dd>${p.degraded}</dd></div>
            <div class="stat"><dt>Fleet agents</dt><dd>${data.fleet_agent_count}</dd></div>
            <div class="stat"><dt>Alerts</dt><dd>${data.alert_count}</dd></div>
            <div class="stat"><dt>API keys</dt><dd>${data.rbac_roles}</dd></div>
          </div>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadFleet() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/fleet/agents");
        const rows = (data.agents || []).map((a) =>
          `<tr><td>${a.robot_name}</td><td>${a.url}</td><td>${a.token ? "yes" : "—"}</td></tr>`
        ).join("") || "<tr><td colspan='3'>No fleet agents registered</td></tr>";
        document.getElementById("tab-fleet").innerHTML = `
          <h2>Fleet View</h2>
          <p>Register agents with <code>spanda fleet agent register</code></p>
          <table><thead><tr><th>Robot</th><th>URL</th><th>Token</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadReadiness() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/dashboard");
        const p = data.device_pool;
        const ready = p.healthy + p.assigned + p.verified;
        const notReady = p.failed + p.quarantined + p.offline;
        document.getElementById("tab-readiness").innerHTML = `
          <h2>Readiness</h2>
          <div class="grid">
            <div class="stat"><dt>Mission-capable devices</dt><dd class="ok">${ready}</dd></div>
            <div class="stat"><dt>Blocked / offline</dt><dd>${notReady}</dd></div>
            <div class="stat"><dt>Discovered (unprovisioned)</dt><dd>${p.discovered}</dd></div>
          </div>
          <p>Run <code>spanda readiness &lt;file.sd&gt; --config spanda.toml</code> for full scoring.</p>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadDevices() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/devices");
        const rows = (data.devices || []).map((d) =>
          `<tr><td>${d.id}</td><td>${d.device_type}</td><td>${d.lifecycle_state}</td><td>${d.assigned_robot || "—"}</td></tr>`
        ).join("") || "<tr><td colspan='4'>No devices in pool — configure [[devices]] in spanda.toml</td></tr>";
        document.getElementById("tab-devices").innerHTML = `
          <h2>Device Pool</h2>
          <table><thead><tr><th>ID</th><th>Type</th><th>Lifecycle</th><th>Assigned robot</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadAlerts() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/alerts");
        const rows = (data.alerts || []).map((a) =>
          `<tr><td>${a.severity}</td><td>${a.alert_type}</td><td>${a.source}</td><td>${a.message}</td></tr>`
        ).join("") || "<tr><td colspan='4'>No alerts</td></tr>";
        document.getElementById("tab-alerts").innerHTML = `
          <h2>Alerts</h2>
          <table><thead><tr><th>Severity</th><th>Type</th><th>Source</th><th>Message</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadHealth() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/health/summary");
        document.getElementById("tab-health").innerHTML = `
          <h2>Health</h2>
          <p>Overall: <strong>${data.overall_status}</strong></p>
          <pre>${JSON.stringify(data.device_pool, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadAssurance() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/assurance/summary");
        document.getElementById("tab-assurance").innerHTML = `
          <h2>Assurance</h2>
          <pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadDiagnosis() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/diagnosis/summary");
        document.getElementById("tab-diagnosis").innerHTML = `
          <h2>Diagnosis</h2>
          <pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadProvision() {
      document.getElementById("tab-provision").innerHTML = `
        <h2>Provisioning</h2>
        <p>POST <code>/v1/provision</code> with <code>{"device_id","robot_id"}</code> (Bearer token).</p>
        <p>Failed provisioning emits a <code>readiness_failed</code> alert and quarantines the device.</p>`;
    }

    async function loadConfig() {
      try {
        errEl.hidden = true;
        const data = await api("/v1/config/snapshots");
        const rows = (data.snapshots || []).map((s) =>
          `<tr><td>${s.id}</td><td>${s.label || "—"}</td><td>${s.device_count}</td></tr>`
        ).join("") || "<tr><td colspan='3'>No snapshots — POST /v1/config/snapshots</td></tr>";
        document.getElementById("tab-config").innerHTML = `
          <h2>Configuration snapshots</h2>
          <table><thead><tr><th>ID</th><th>Label</th><th>Devices</th></tr></thead><tbody>${rows}</tbody></table>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadDrift() {
      try {
        errEl.hidden = true;
        const snaps = await api("/v1/config/snapshots");
        const first = (snaps.snapshots || [])[0];
        if (!first) {
          document.getElementById("tab-drift").innerHTML = `<h2>Drift</h2><p>Save a baseline snapshot first.</p>`;
          return;
        }
        const data = await api("/v1/drift?baseline_id=" + encodeURIComponent(first.id));
        const dims = data.report.by_dimension || {};
        const dimCards = Object.entries(dims).map(([name, count]) =>
          `<div class="stat"><dt>${name}</dt><dd>${count}</dd></div>`
        ).join("");
        document.getElementById("tab-drift").innerHTML = `
          <h2>Operational drift</h2>
          <p>Baseline: <code>${first.id}</code> — passed: <strong class="${data.report.passed ? "ok" : "error"}">${data.report.passed}</strong></p>
          <h3>By dimension</h3>
          <div class="grid">${dimCards || "<p>No drift findings</p>"}</div>
          <h3>Full report</h3>
          <pre>${JSON.stringify(data.report, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadOta() {
      try {
        errEl.hidden = true;
        const status = await api("/v1/ota/status");
        document.getElementById("tab-ota").innerHTML = `
          <h2>OTA rollout</h2>
          <p>Plan via <code>POST /v1/ota/plan</code> — strategies: canary, staged, blue_green.</p>
          <pre>${JSON.stringify(status, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadSecurity() {
      try {
        errEl.hidden = true;
        const trust = await api("/v1/trust/package?name=spanda-mqtt");
        const rbac = await api("/v1/rbac/matrix");
        document.getElementById("tab-security").innerHTML = `
          <h2>Security &amp; trust</h2>
          <h3>Package trust (spanda-mqtt)</h3>
          <pre>${JSON.stringify(trust, null, 2)}</pre>
          <h3>RBAC matrix</h3>
          <pre>${JSON.stringify(rbac.matrix, null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    async function loadSre() {
      try {
        errEl.hidden = true;
        const sre = await api("/v1/sre/summary");
        const incidents = await api("/v1/sre/incidents");
        const traces = await api("/v1/observability/traces");
        const slo = sre.slo || {};
        const rows = (incidents.incidents || []).map((inc) => `
          <tr>
            <td><code>${inc.id}</code></td>
            <td>${inc.title}</td>
            <td>${inc.status}</td>
            <td>${inc.severity}</td>
            <td>
              ${inc.status === "open" ? `<button type="button" onclick="sreAckIncident('${inc.id}')">Ack</button>` : ""}
              ${inc.status !== "resolved" ? `<button type="button" onclick="sreResolveIncident('${inc.id}')">Resolve</button>` : ""}
            </td>
          </tr>`).join("") || "<tr><td colspan='5'>No incidents</td></tr>";
        document.getElementById("tab-sre").innerHTML = `
          <h2>SRE dashboard</h2>
          <div class="grid">
            <div class="stat"><dt>Availability %</dt><dd>${sre.availability_percent.toFixed(1)}</dd></div>
            <div class="stat"><dt>SLO target %</dt><dd>${(slo.target_percent ?? 99).toFixed(1)}</dd></div>
            <div class="stat"><dt>SLO met</dt><dd class="${slo.met ? "ok" : "error"}">${slo.met ? "yes" : "no"}</dd></div>
            <div class="stat"><dt>Incidents open</dt><dd>${sre.incidents_open ?? 0}</dd></div>
            <div class="stat"><dt>MTTR hint (ms)</dt><dd>${sre.mttr_hint_ms ?? "—"}</dd></div>
            <div class="stat"><dt>MTBF hint (ms)</dt><dd>${sre.mtbf_hint_ms ?? "—"}</dd></div>
            <div class="stat"><dt>Alerts</dt><dd>${sre.alerts_total}</dd></div>
            <div class="stat"><dt>Critical</dt><dd>${sre.alerts_critical}</dd></div>
            <div class="stat"><dt>Traces</dt><dd>${sre.traces_recorded}</dd></div>
          </div>
          <h3>Incidents</h3>
          <p><button type="button" onclick="sreCreateIncident()">Open incident</button>
          ${window.SPANDA_API_KEY ? "" : " — set <code>window.SPANDA_API_KEY</code> for mutations"}</p>
          <table><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Severity</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>
          <h3>Recent traces</h3>
          <pre>${JSON.stringify((traces.traces || []).slice(-5), null, 2)}</pre>`;
      } catch (e) { showError(String(e)); }
    }

    function loadOperator() {
      document.getElementById("tab-operator").innerHTML = `
        <h2>Operator workflows</h2>
        <ul>
          <li><code>POST /v1/operator/mission/approve</code> — mission approval (Bearer, Approve role)</li>
          <li><code>POST /v1/operator/quarantine</code> — quarantine device (Bearer, Operate role)</li>
          <li><code>POST /v1/rpc</code> — gRPC-compatible JSON gateway</li>
        </ul>`;
    }

    async function loadAudit() {
      try {
        errEl.hidden = true;
        const res = await fetch("/v1/compliance/export?profile=defense", {
          headers: { Authorization: "Bearer " + (window.SPANDA_API_KEY || "") }
        });
        if (!res.ok) throw new Error("compliance export " + res.status);
        const data = await res.json();
        document.getElementById("tab-audit").innerHTML = `
          <h2>Compliance audit export</h2>
          <p>Audit ID: <code>${data.export.audit_export_id}</code></p>
          <pre>${data.markdown || JSON.stringify(data.export, null, 2)}</pre>`;
      } catch (e) {
        document.getElementById("tab-audit").innerHTML = `
          <h2>Compliance audit export</h2>
          <p class="error">Requires <code>--program</code> and Bearer token. ${e}</p>`;
      }
    }

    async function loadDigitalThread() {
      try {
        errEl.hidden = true;
        const cap = document.getElementById("dt-capability")?.value?.trim() || "";
        const dev = document.getElementById("dt-device")?.value?.trim() || "";
        const phaseRaw = document.getElementById("dt-lifecycle")?.value?.trim() || "";
        const lifecyclePhases = ["", "requirement", "design", "deploy", "operate", "retire"];
        const phase = lifecyclePhases.includes(phaseRaw) ? phaseRaw : "";
        const params = new URLSearchParams();
        if (cap) params.set("capability", cap);
        if (dev) params.set("device_id", dev);
        if (phase) params.set("lifecycle_phase", phase);
        const qs = params.toString();
        const data = await api("/v1/digital-thread/query" + (qs ? "?" + qs : ""));
        const thread = data.digital_thread;
        const panel = document.getElementById("tab-digital-thread");
        panel.innerHTML = `
          <h2>Digital thread</h2>
          <div class="dt-filters">
            <label>Capability<input id="dt-capability" placeholder="navigate" /></label>
            <label>Device id<input id="dt-device" placeholder="gps-001" /></label>
            <label>Lifecycle<select id="dt-lifecycle">
              <option value="">All phases</option>
              <option value="requirement">Requirement</option>
              <option value="design">Design</option>
              <option value="deploy">Deploy</option>
              <option value="operate">Operate</option>
              <option value="retire">Retire</option>
            </select></label>
            <button type="button" id="dt-query">Query</button>
          </div>
          <p>${thread.matched_node_count} nodes, ${thread.matched_edge_count} edges — click nodes to highlight neighbors</p>
          <div class="dt-legend">Mission · Robot · Capability · Hardware · Provider · Package · Safety</div>
          <div class="dt-graph-wrap" id="dt-graph"></div>
          <div class="dt-detail" id="dt-detail"></div>
          <details><summary>Chain summary</summary><pre>${JSON.stringify(thread.chain_summary, null, 2)}</pre></details>`;
        document.getElementById("dt-capability").value = cap;
        document.getElementById("dt-device").value = dev;
        document.getElementById("dt-lifecycle").value = phase;
        document.getElementById("dt-query").onclick = loadDigitalThread;
        renderDigitalThreadGraph(document.getElementById("dt-graph"), thread, document.getElementById("dt-detail"));
      } catch (e) { showError(String(e)); }
    }

    function renderDigitalThreadGraph(container, thread, detailEl) {
      const nodes = (thread.graph && thread.graph.nodes) || [];
      const edges = (thread.graph && thread.graph.edges) || [];
      const kindCol = { mission: 0, robot: 1, capability: 2, hardware: 3, sensor: 3, actuator: 3, provider: 4, package: 5, safety: 6 };
      const kindColor = { mission: "#6366f1", robot: "#3b82f6", capability: "#eab308", hardware: "#94a3b8", sensor: "#22d3ee", actuator: "#f97316", provider: "#22c55e", package: "#a3e635", safety: "#f87171" };
      const NW = 128, NH = 36, COL = 168, ROW = 52, PAD = 28;
      const colRows = {};
      const positions = {};
      nodes.slice().sort((a, b) => (kindCol[a.kind] ?? 3) - (kindCol[b.kind] ?? 3) || a.label.localeCompare(b.label)).forEach((n) => {
        const c = kindCol[n.kind] ?? 3;
        const r = colRows[c] || 0;
        colRows[c] = r + 1;
        positions[n.id] = { x: PAD + c * COL, y: PAD + r * ROW };
      });
      let maxRow = 1;
      Object.values(colRows).forEach((r) => { if (r > maxRow) maxRow = r; });
      const W = PAD * 2 + 6 * COL + NW;
      const H = PAD * 2 + maxRow * ROW + NH;
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      let selected = null;
      const nodeMap = Object.fromEntries(nodes.map((n) => [n.id, n]));

      function neighbors(id) {
        const set = new Set([id]);
        edges.forEach((e) => {
          if (e.from === id) set.add(e.to);
          if (e.to === id) set.add(e.from);
        });
        return set;
      }

      function draw() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        const linked = selected ? neighbors(selected) : null;
        edges.forEach((e) => {
          const f = positions[e.from], t = positions[e.to];
          if (!f || !t) return;
          const active = !linked || (linked.has(e.from) && linked.has(e.to));
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          const x1 = f.x + NW, y1 = f.y + NH / 2, x2 = t.x, y2 = t.y + NH / 2, mx = (x1 + x2) / 2;
          path.setAttribute("d", `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", active ? "#58a6ff" : "#2d3a4f");
          path.setAttribute("stroke-width", active ? "2" : "1");
          path.setAttribute("opacity", active ? "0.9" : "0.35");
          svg.appendChild(path);
        });
        nodes.forEach((n) => {
          const p = positions[n.id];
          if (!p) return;
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("transform", `translate(${p.x},${p.y})`);
          g.style.cursor = "pointer";
          const dim = linked && !linked.has(n.id);
          g.setAttribute("opacity", dim ? "0.35" : "1");
          const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          rect.setAttribute("width", NW);
          rect.setAttribute("height", NH);
          rect.setAttribute("rx", "6");
          rect.setAttribute("fill", kindColor[n.kind] || "#64748b");
          rect.setAttribute("stroke", n.id === selected ? "#f0f6fc" : "#0f1419");
          rect.setAttribute("stroke-width", n.id === selected ? "2" : "1");
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", NW / 2);
          text.setAttribute("y", NH / 2 + 4);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("font-size", "11");
          text.setAttribute("fill", "#0f1419");
          const label = n.label.length > 16 ? n.label.slice(0, 14) + "…" : n.label;
          text.textContent = label;
          g.appendChild(rect);
          g.appendChild(text);
          g.addEventListener("click", () => {
            selected = selected === n.id ? null : n.id;
            const node = nodeMap[selected];
            if (!selected || !node) {
              detailEl.textContent = "";
            } else {
              detailEl.textContent = `${node.kind}: ${node.label} (${node.id})`;
            }
            draw();
          });
          svg.appendChild(g);
        });
      }
      draw();
      container.appendChild(svg);
    }
