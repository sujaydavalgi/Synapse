syntax = "proto3";
package spanda.v1;

message Empty {}

message HealthResponse {
  string status = 1;
}

message JsonResponse {
  string json = 1;
}

message DriftRequest {
  string baseline_id = 1;
}

message ReadinessRequest {
  string body_json = 1;
}

message TrustPackageRequest {
  string package_name = 1;
}

message QueryRequest {
  string query = 1;
}

message JsonBodyRequest {
  string body_json = 1;
}

message DeviceIdRequest {
  string device_id = 1;
}

message DeviceBodyRequest {
  string device_id = 1;
  string body_json = 2;
}

service ControlCenter {
  rpc Health(Empty) returns (HealthResponse);
  rpc GetDashboard(Empty) returns (JsonResponse);
  rpc ListDevices(Empty) returns (JsonResponse);
  rpc GetDevice(DeviceIdRequest) returns (JsonResponse);
  rpc PatchDevice(DeviceBodyRequest) returns (JsonResponse);
  rpc DeviceProvision(DeviceBodyRequest) returns (JsonResponse);
  rpc DeviceAssign(DeviceBodyRequest) returns (JsonResponse);
  rpc DeviceQuarantine(DeviceIdRequest) returns (JsonResponse);
  rpc DeviceTrust(DeviceIdRequest) returns (JsonResponse);
  rpc ListFleetAgents(Empty) returns (JsonResponse);
  rpc EvaluateReadiness(ReadinessRequest) returns (JsonResponse);
  rpc GetSreSummary(Empty) returns (JsonResponse);
  rpc GetTrustPackage(TrustPackageRequest) returns (JsonResponse);
  rpc GetOpenApi(Empty) returns (JsonResponse);
  rpc GetHealthSummary(Empty) returns (JsonResponse);
  rpc GetAssuranceSummary(Empty) returns (JsonResponse);
  rpc GetDiagnosisSummary(Empty) returns (JsonResponse);
  rpc GetExecutiveScorecard(Empty) returns (JsonResponse);
  rpc QueryDigitalThread(QueryRequest) returns (JsonResponse);
  rpc GetOtaStatus(Empty) returns (JsonResponse);
  rpc GetOtlpMetrics(Empty) returns (JsonResponse);
  rpc DiscoverDevices(QueryRequest) returns (JsonResponse);
  rpc RunDiscovery(JsonBodyRequest) returns (JsonResponse);
  rpc ProvisionDevice(JsonBodyRequest) returns (JsonResponse);
  rpc PlanOta(JsonBodyRequest) returns (JsonResponse);
  rpc ExecuteOta(JsonBodyRequest) returns (JsonResponse);
  rpc ListRobots(Empty) returns (JsonResponse);
  rpc ListFleets(Empty) returns (JsonResponse);
  rpc ListAlerts(Empty) returns (JsonResponse);
  rpc ListConfigSnapshots(Empty) returns (JsonResponse);
  rpc SaveConfigSnapshot(JsonBodyRequest) returns (JsonResponse);
  rpc TestAlert(Empty) returns (JsonResponse);
  rpc GetDeviceTree(Empty) returns (JsonResponse);
  rpc GetDeviceReports(Empty) returns (JsonResponse);
  rpc GetFailoverChains(Empty) returns (JsonResponse);
  rpc ListSecrets(Empty) returns (JsonResponse);
  rpc GetRbacMatrix(Empty) returns (JsonResponse);
  rpc GetAnalyticsReadiness(QueryRequest) returns (JsonResponse);
  rpc ExportReports(QueryRequest) returns (JsonResponse);
  rpc GetObservabilityTraces(Empty) returns (JsonResponse);
  rpc GetOtlpTraces(Empty) returns (JsonResponse);
  rpc ExportOtlpTraces(QueryRequest) returns (JsonResponse);
  rpc ExportOtlpMetrics(QueryRequest) returns (JsonResponse);
  rpc OperatorQuarantine(JsonBodyRequest) returns (JsonResponse);
  rpc OperatorMissionApprove(JsonBodyRequest) returns (JsonResponse);
  rpc ExportCompliance(QueryRequest) returns (JsonResponse);
  rpc DetectDrift(DriftRequest) returns (JsonResponse);
}
