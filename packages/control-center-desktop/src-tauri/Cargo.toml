[package]
name = "spanda-control-center-desktop"
version = "0.4.0"
description = "Tauri desktop shell for Spanda Control Center"
edition = "2021"

[lib]
name = "spanda_control_center_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "spanda-control-center-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"
