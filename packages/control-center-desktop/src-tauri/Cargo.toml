[package]
name = "spanda-control-center-desktop"
version = "0.4.2"
description = "Tauri desktop shell for Spanda Control Center"
edition = "2021"

[lib]
name = "spanda_control_center_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "spanda-control-center-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde_json = "1"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-updater = "2"

# RUSTSEC-2024-0429: crates.io glib 0.18.5 lacks VariantStrIter fix; gtk-rs 0.18 branch includes backport.
[patch.crates-io]
glib = { git = "https://github.com/gtk-rs/gtk-rs-core", branch = "0.18" }
glib-sys = { git = "https://github.com/gtk-rs/gtk-rs-core", branch = "0.18" }
glib-macros = { git = "https://github.com/gtk-rs/gtk-rs-core", branch = "0.18" }
