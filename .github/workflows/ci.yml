name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        uses: ./.github/actions/install-protoc
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo build -p spanda-core --no-default-features
      - run: cargo run -q -p spanda-package --bin registry-index-maintain -- --verify
      - run: cargo test --workspace
      - run: pip install pytest
      - run: PYTHONPATH=sdk/python python -m pytest sdk/python
      - run: npm ci --prefix sdk/typescript && npm test --prefix sdk/typescript
      - run: cargo doc --workspace --no-deps
      - run: python3 scripts/validate_documentation.py --warn --report
      - run: cargo build -p spanda --release
      - run: cargo run -q -p spanda --release -- doc examples/ --out /tmp/spanda-doc-test
      - run: python3 scripts/generate_spanda_reference.py
      - run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./mdbook build docs-site
      - run: chmod +x scripts/readiness_smoke.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/readiness_smoke.sh
      - run: chmod +x scripts/sdk_smoke.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/sdk_smoke.sh
      - run: chmod +x scripts/check_all_examples.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/check_all_examples.sh

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  robotics-golden-path:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x examples/robotics/golden_path_deploy.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./examples/robotics/golden_path_deploy.sh

  telemetry-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/telemetry_store_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          export SPANDA_BIN="${{ github.workspace }}/target/release/spanda"
          ./scripts/telemetry_store_golden_path.sh

  mqtt-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Install Mosquitto
        run: sudo apt-get update && sudo apt-get install -y mosquitto mosquitto-clients
      - run: chmod +x scripts/mqtt_golden_path.sh
      - run: ./scripts/mqtt_golden_path.sh

  twin-cloud-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/twin_cloud_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/twin_cloud_golden_path.sh

  llvm-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - run: chmod +x scripts/llvm_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/llvm_golden_path.sh

  llvm-embedded-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Install clang and aarch64 cross toolchain
        run: sudo apt-get update && sudo apt-get install -y clang gcc-aarch64-linux-gnu
      - run: chmod +x scripts/llvm_embedded_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/llvm_embedded_golden_path.sh

  cpp-native-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y g++
      - run: chmod +x scripts/cpp_native_golden_path.sh
      - run: ./scripts/cpp_native_golden_path.sh

  ledger-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/ledger_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/ledger_golden_path.sh

  self-host-lexer-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/self_host_lexer_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/self_host_lexer_golden_path.sh

  world-model-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/world_model_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/world_model_golden_path.sh

  killer-demo-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/killer_demo_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/killer_demo_golden_path.sh

  showcase-smoke:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: npm ci
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/showcase_smoke.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          export SPANDA_BIN="${{ github.workspace }}/target/release/spanda"
          ./scripts/showcase_smoke.sh

  adas-smoke:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/adas_smoke.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          export SPANDA_BIN="${{ github.workspace }}/target/release/spanda"
          ./scripts/adas_smoke.sh

  adas-promotion-gate:
    runs-on: ubuntu-latest
    needs: adas-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/adas_stable_promotion_gate.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          export SPANDA_BIN="${{ github.workspace }}/target/release/spanda"
          SPANDA_ADAS_SKIP_SOAK=1 SPANDA_ADAS_SKIP_AUDIT=1 SPANDA_ADAS_SKIP_SMOKE=1 ./scripts/adas_stable_promotion_gate.sh

  live-ai-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/live_ai_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/live_ai_golden_path.sh

  live-iot-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: chmod +x scripts/live_iot_golden_path.sh
      - run: ./scripts/live_iot_golden_path.sh

  registry-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/registry_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/registry_golden_path.sh

  ci-verify-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/ci_verify_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/ci_verify_golden_path.sh

  python-native-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: chmod +x scripts/python_native_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/python_native_golden_path.sh
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

  ros2-golden-path:
    runs-on: ubuntu-22.04
    needs: rust
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Setup ROS 2 Humble
        env:
          ROS_APT_SOURCE_VERSION: "1.2.0"
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl --fail --location --retry 3 --retry-delay 2 \
            -o /tmp/ros2-apt-source.deb \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.jammy_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb
          sudo apt-get update
          sudo apt-get install -y ros-humble-ros-base ros-humble-rclpy
      - run: chmod +x scripts/ros2_golden_path.sh
      - run: |
          export PATH="${{ github.workspace }}/target/release:$PATH"
          ./scripts/ros2_golden_path.sh

  ros2-rclrs-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Setup ROS 2 Humble (pinned ros-apt-source)
        env:
          ROS_APT_SOURCE_VERSION: "1.2.0"
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl --fail --location --retry 3 --retry-delay 2 \
            -o /tmp/ros2-apt-source.deb \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.jammy_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb
          sudo apt-get update
          sudo apt-get install -y ros-humble-ros-base
      - name: Install ROS message packages for rclrs
        run: sudo apt-get update && sudo apt-get install -y ros-humble-test-msgs ros-humble-example-interfaces
      - name: Test native rclrs crate
        run: |
          . /opt/ros/humble/setup.sh
          cargo build --manifest-path crates/spanda-ros2-rclrs-native/Cargo.toml --release --target-dir target
          export SPANDA_ROS2_RCLRS_LIB="$PWD/target/release/libspanda_ros2_rclrs_native.so"
          cargo test --manifest-path crates/spanda-ros2-rclrs-native/Cargo.toml --target-dir target
          cargo test -p spanda-core --lib transport_rclrs

  lsp:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - run: npm ci
      - run: cargo build -p spanda --release
      - run: npm run build --workspace=@spanda/lsp
      - run: npm test -- tests/lsp.test.ts

  wasm:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: rustup target add wasm32-unknown-unknown
      - run: cargo check -p spanda-telemetry-store --target wasm32-unknown-unknown --no-default-features
      - run: cargo check -p spanda-wasm --target wasm32-unknown-unknown
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: npm run build:wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run web:build

  vscode-extension:
    runs-on: ubuntu-latest
    needs: [rust, lsp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@spanda/lsp
      - run: npm install --prefix editor/vscode
      - run: npm run package:ci --prefix editor/vscode

  enterprise-ops-smoke:
    runs-on: ubuntu-latest
    needs: rust
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build -p spanda --release
      - run: chmod +x scripts/enterprise_ops_smoke.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/enterprise_ops_smoke.sh

  entity-model-smoke:
    runs-on: ubuntu-latest
    needs: rust
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: cargo build -p spanda --release
      - run: npm ci
      - run: chmod +x scripts/entity_model_smoke.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/entity_model_smoke.sh

  control-center-desktop:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: chmod +x scripts/build_control_center_desktop.sh
      - run: ./scripts/build_control_center_desktop.sh
        env:
          SKIP_TAURI_LINUX_CARGO_CHECK: "1"

  control-center-desktop-bundle:
    runs-on: macos-latest
    needs: rust
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: chmod +x scripts/build_control_center_desktop.sh scripts/sign_tauri_macos.sh
      - run: TAURI_BUILD=1 ./scripts/build_control_center_desktop.sh
      - name: Codesign macOS bundle (optional)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARIZE_PROFILE: ${{ secrets.APPLE_NOTARIZE_PROFILE }}
        run: ./scripts/sign_tauri_macos.sh
      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: control-center-desktop-macos
          path: packages/control-center-desktop/src-tauri/target/release/bundle/
          if-no-files-found: warn
