name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo build -p spanda-core --no-default-features
      - run: cargo run -q -p spanda-package --bin registry-index-maintain -- --verify
      - run: cargo test --workspace
      - run: cargo build -p spanda-cli --release
      - run: chmod +x scripts/check_all_examples.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/check_all_examples.sh

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit

  robotics-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p spanda-cli --release
      - run: chmod +x examples/robotics/golden_path_deploy.sh
      - run: ./examples/robotics/golden_path_deploy.sh
        env:
          PATH: ${{ github.workspace }}/target/release:${{ env.PATH }}

  mqtt-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Mosquitto
        run: sudo apt-get update && sudo apt-get install -y mosquitto mosquitto-clients
      - run: chmod +x scripts/mqtt_golden_path.sh
      - run: ./scripts/mqtt_golden_path.sh

  twin-cloud-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p spanda-cli --release
      - run: chmod +x scripts/twin_cloud_golden_path.sh
      - run: ./scripts/twin_cloud_golden_path.sh
        env:
          PATH: ${{ github.workspace }}/target/release:${{ env.PATH }}

  llvm-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - run: chmod +x scripts/llvm_golden_path.sh
      - run: SPANDA_BIN=${{ github.workspace }}/target/release/spanda ./scripts/llvm_golden_path.sh
        env:
          PATH: ${{ github.workspace }}/target/release:${{ env.PATH }}

  cpp-native-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y g++
      - run: chmod +x scripts/cpp_native_golden_path.sh
      - run: ./scripts/cpp_native_golden_path.sh

  ledger-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p spanda-cli --release
      - run: chmod +x scripts/ledger_golden_path.sh
      - run: ./scripts/ledger_golden_path.sh
        env:
          PATH: ${{ github.workspace }}/target/release:${{ env.PATH }}

  self-host-lexer-golden-path:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p spanda-cli --release
      - run: chmod +x scripts/self_host_lexer_golden_path.sh
      - run: ./scripts/self_host_lexer_golden_path.sh
        env:
          PATH: ${{ github.workspace }}/target/release:${{ env.PATH }}

  ros2-rclrs-native:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup ROS 2 Humble (pinned ros-apt-source)
        env:
          ROS_APT_SOURCE_VERSION: "1.2.0"
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl --fail --location --retry 3 --retry-delay 2 \
            -o /tmp/ros2-apt-source.deb \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${ROS_APT_SOURCE_VERSION}/ros2-apt-source_${ROS_APT_SOURCE_VERSION}.jammy_all.deb"
          sudo dpkg -i /tmp/ros2-apt-source.deb
          sudo apt-get update
          sudo apt-get install -y ros-humble-ros-base
      - name: Install ROS message packages for rclrs
        run: sudo apt-get update && sudo apt-get install -y ros-humble-test-msgs ros-humble-example-interfaces
      - name: Test native rclrs crate
        run: |
          . /opt/ros/humble/setup.sh
          cargo build --manifest-path crates/spanda-ros2-rclrs-native/Cargo.toml --release --target-dir target
          export SPANDA_ROS2_RCLRS_LIB="$PWD/target/release/libspanda_ros2_rclrs_native.so"
          cargo test --manifest-path crates/spanda-ros2-rclrs-native/Cargo.toml --target-dir target
          cargo test -p spanda-core --lib transport_rclrs

  lsp:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: cargo build -p spanda-cli --release
      - run: npm run build --workspace=@spanda/lsp
      - run: npm test -- tests/lsp.test.ts

  wasm:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: npm run build:wasm
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run web:build

  vscode-extension:
    runs-on: ubuntu-latest
    needs: [rust, lsp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@spanda/lsp
      - run: npm install --prefix editor/vscode
      - run: npm run package:ci --prefix editor/vscode
