# Reusable workspace version bump + optional release tag push.
#
# Called by "Bump version" (manual) and "Auto release" (after CI on labeled PR merges).

name: Release bump

on:
  workflow_call:
    inputs:
      bump:
        description: Semver component to increment (major, minor, or patch)
        required: true
        type: string
      push_tag:
        description: Push v* tag to trigger the Release workflow
        required: true
        type: boolean
      ref:
        description: Git ref to bump (defaults to main)
        required: false
        type: string
        default: main

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    concurrency:
      group: release-bump
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify bump ref matches main tip
        run: |
          REQUESTED="${{ inputs.ref }}"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$REQUESTED" = "main" ] || [ "$REQUESTED" = "$HEAD_SHA" ]; then
            echo "Bumping main at $HEAD_SHA"
            exit 0
          fi
          echo "::error::Ref $REQUESTED is not current main ($HEAD_SHA); refusing privileged bump"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Bump workspace version
        id: bump
        run: python3 scripts/bump_version.py "${{ inputs.bump }}" --github-output "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml CHANGELOG.md package.json package-lock.json packages/ editor/vscode/
          git commit -m "chore: release v${VERSION}"

      - name: Push version commit
        run: git push origin HEAD:main

      - name: Push release tag
        if: inputs.push_tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
