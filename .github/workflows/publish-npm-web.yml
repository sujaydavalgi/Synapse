name: Publish npm web package

on:
  workflow_dispatch:
  push:
    tags:
      - 'npm-web-v*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@davalgi-spanda/web
      - name: Validate publish tarball
        if: github.event_name == 'pull_request'
        working-directory: packages/web
        run: npm pack --dry-run
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/npm-web-v')
        working-directory: packages/web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish --access public
