name: Feature Request
description: Suggest a new feature or improvement for Spanda tooling or ecosystem
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For **language syntax or semantics** changes, use the Language Proposal template instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or improvement you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you have considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / tooling
        - LSP / editor experience
        - Package ecosystem
        - Documentation / examples
        - CI / release engineering
        - Web playground
        - ROS2 / transport integration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
          required: false
